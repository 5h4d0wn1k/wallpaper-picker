name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  linting:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run ShellCheck
        run: |
          if ! command -v shellcheck &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi
          shellcheck -x -S warning src/wallpaper-picker || true
          shellcheck -x -S warning install.sh || true
      
      - name: Check Python syntax
        run: |
          python3 -m py_compile src/wallpaper-picker-gui || true
      
      - name: Verify shebang
        run: |
          head -1 src/wallpaper-picker | grep -q "^#!/usr/bin/env bash" || echo "Missing proper shebang"
          head -1 src/wallpaper-picker-gui | grep -q "^#!/usr/bin/env python3" || echo "Missing python shebang"
      
      - name: Check for common issues
        run: |
          # Check for TODO comments
          grep -r "TODO" src/ --include="*.sh" --include="*.py" || true
          
          # Check for debug statements
          grep -rn "print(" src/*.py 2>/dev/null | grep -v "__pycache__" || true

  bash-tests:
    name: Bash Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Syntax Check
        run: |
          bash -n src/wallpaper-picker
          bash -n install.sh
      
      - name: Mock Dependencies
        run: |
          mkdir -p ~/bin
          echo '#!/bin/bash' > ~/bin/mpvpaper
          echo 'echo "mock"' >> ~/bin/mpvpaper
          chmod +x ~/bin/mpvpaper
          echo '#!/bin/bash' > ~/bin/notify-send
          echo 'echo "mock"' >> ~/bin/notify-send
          chmod +x ~/bin/notify-send
          echo 'export PATH=~/bin:$PATH' >> $GITHUB_ENV
      
      - name: Run Tests
        run: |
          export PATH=~/bin:$PATH
          chmod +x src/wallpaper-picker
          
          # Test version
          ./src/wallpaper-picker --version | grep -q "wallpaper-picker"
          
          # Test help
          ./src/wallpaper-picker --help | grep -q "COMMANDS"
          
          # Test doctor (with mock)
          ./src/wallpaper-picker doctor || true
          
          # Test list
          ./src/wallpaper-picker list || true

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Syntax Check
        run: |
          python3 -m py_compile src/wallpaper-picker-gui
      
      - name: Check imports
        run: |
          python3 -c "
            import sys
            sys.path.insert(0, 'src')
            # Check basic syntax without GTK
            with open('src/wallpaper-picker-gui') as f:
                compile(f.read(), 'wallpaper-picker-gui', 'exec')
            print('Python syntax OK')
          "

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Test Environment
        run: |
          mkdir -p ~/Videos/wallpapers
          echo "test video" > ~/Videos/wallpapers/test.mp4
          mkdir -p ~/.config/wallpaper-picker
          mkdir -p ~/.local/share/wallpaper-picker
      
      - name: Run Integration Tests
        run: |
          chmod +x src/wallpaper-picker
          ./src/wallpaper-picker list
          ./src/wallpaper-picker monitors || true
          ./src/wallpaper-picker status || true
          ./src/wallpaper-picker watch-dirs || true

  test-matrix:
    name: Test on Multiple Shells
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shell: [bash, sh]
    steps:
      - uses: actions/checkout@v4
      
      - name: Test with ${{ matrix.shell }}
        run: |
          if command -v ${{ matrix.shell }} &>/dev/null; then
            chmod +x src/wallpaper-picker
            ${{ matrix.shell }} -n src/wallpaper-picker && echo "Syntax OK with ${{ matrix.shell }}"
          fi

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Count lines
        run: |
          echo "=== Code Statistics ==="
          echo "Bash: $(wc -l < src/wallpaper-picker) lines"
          echo "Python: $(wc -l < src/wallpaper-picker-gui) lines"
          echo "Install: $(wc -l < install.sh) lines"
          echo ""
          echo "=== Function Count ==="
          grep -c "^cmd_" src/wallpaper-picker || true
          grep -c "^def " src/wallpaper-picker-gui || true

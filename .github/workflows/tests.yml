name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  VERSION: ${{ github.ref_name }}
  REPO: ${{ github.repository }}

jobs:
  linting:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: ShellCheck Analysis
        run: |
          if ! command -v shellcheck &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi
          shellcheck -x -S error src/wallpaper-picker || exit 1
          shellcheck -x -S error install.sh || exit 1
      
      - name: Check Python Syntax
        run: |
          python3 -m py_compile src/wallpaper-picker-gui
      
      - name: Verify Shebang Headers
        run: |
          head -1 src/wallpaper-picker | grep -q "^#!/usr/bin/env bash" || exit 1
          head -1 src/wallpaper-picker-gui | grep -q "^#!/usr/bin/env python3" || exit 1
      
      - name: Check File Permissions
        run: |
          [[ -x src/wallpaper-picker ]] || exit 1
          [[ -x src/wallpaper-picker-gui ]] || exit 1

  bash-tests:
    name: Bash Script Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Bash Syntax Check
        run: |
          bash -n src/wallpaper-picker
          bash -n install.sh
      
      - name: Mock Dependencies
        run: |
          mkdir -p ~/bin
          cat > ~/bin/mpvpaper << 'EOF'
          #!/bin/bash
          exit 0
          EOF
          chmod +x ~/bin/mpvpaper
          cat > ~/bin/notify-send << 'EOF'
          #!/bin/bash
          exit 0
          EOF
          chmod +x ~/bin/notify-send
          for cmd in fzf jq hyprctl; do
            cat > ~/bin/$cmd << 'EOF'
            #!/bin/bash
            exit 0
            EOF
            chmod +x ~/bin/$cmd
          done
          echo 'export PATH=~/bin:$PATH' >> $GITHUB_ENV
      
      - name: Run Command Tests
        run: |
          chmod +x src/wallpaper-picker
          chmod +x tests/run_tests.sh
          ./tests/run_tests.sh

  security-check:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for Hardcoded Secrets
        run: |
          if command -v gitleaks &>/dev/null; then
            gitleaks detect --source . --verbose || true
          else
            echo "Gitleaks not installed, skipping"
            grep -rE "(password|secret|api_key|token)\s*=" src/ || true
          fi
      
      - name: Check for Unsafe Downloads
        run: |
          grep -n "curl.*| sh" install.sh || echo "OK"
          grep -n "wget.*-O-" install.sh || echo "OK"

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ['3.10', '3.11', '3.12']
      
      - name: Python Syntax Check
        run: |
          python3 -m py_compile src/wallpaper-picker-gui
      
      - name: Check GTK4 Imports
        run: |
          python3 -c "
            import ast
            with open('src/wallpaper-picker-gui') as f:
                tree = ast.parse(f.read())
            print('Python AST valid')
          "

  package-build:
    name: Package Build
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Build Dependencies
        run: |
          pacman -Sy --noconfirm git base-devel
      
      - name: Build AUR Package
        run: |
          cp PKGBUILD /tmp/
          cp wallpaper-picker.install /tmp/
          cd /tmp && makepkg --printsrcinfo > .SRCINFO
      
      - name: Verify PKGBUILD
        run: |
          grep -q "pkgname=wallpaper-picker" /tmp/PKGBUILD

  release:
    name: Create Release
    needs: [linting, bash-tests, security-check, python-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Release Archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p release
          tar -czf release/wallpaper-picker-${VERSION}.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tests' \
            .
      
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  aur-sync:
    name: AUR Sync
    needs: [release]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: 5h4d0wn1k/wallpaper-picker
          ref: main
      
      - name: Setup AUR Credentials
        env:
          AUR_TOKEN: ${{ secrets.AUR_TOKEN }}
        run: |
          echo "$AUR_TOKEN" | xargs -I{} git remote set-url origin "ssh://aur@aur.archlinux.org/wallpaper-picker.git"
      
      - name: Update AUR Package
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Update version in PKGBUILD
          sed -i "s/pkgver=.*/pkgver=${GITHUB_REF_NAME#v}/" PKGBUILD
          makepkg --printsrcinfo > .SRCINFO
          
          git add PKGBUILD .SRCINFO
          git commit -m "Release v${GITHUB_REF_NAME#v}"
          git push origin master

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            5h4d0wn1k/wallpaper-picker:latest
            5h4d0wn1k/wallpaper-picker:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    name: Notify Success
    needs: [linting, bash-tests, security-check, python-tests]
    runs-on: ubuntu-latest
    if: always() && needs.linting.result == 'success' && needs.bash-tests.result == 'success'
    steps:
      - name: Success Notification
        run: |
          echo "All tests passed! ✓"

name: Bug Report
description: Report a bug to help us improve
title: "[Bug] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Description
        Please describe the bug clearly.

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What you expected to happen

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g., wallpaper-picker v2.0.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      placeholder: Paste any relevant log output here

  - type: checkboxes
    id: terms
    attributes:
      label: 
      options:
        - label: I have searched for similar issues
          required: true
        - label: I am using the latest version
          required: true
